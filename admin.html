<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Paróquia Santa Teresinha</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="imgs/logo-2.png" type="image/png" sizes="32x32">
  <script src="admin.js" defer></script>
</head>
<body class="min-h-screen bg-stone-50 text-stone-950">
  <main class="min-h-screen">
    <section id="loading-view" class="min-h-screen flex items-center justify-center px-5">
      <div class="w-full max-w-sm rounded-lg border border-red-950/10 bg-white p-6 text-center shadow-sm">
        <img src="imgs/logo-2.png" alt="Paróquia Santa Teresinha" class="mx-auto mb-4 h-16 w-16 object-contain">
        <p class="text-sm font-semibold text-red-950">Carregando painel...</p>
      </div>
    </section>

    <section id="login-view" class="hidden min-h-screen px-5 py-8">
      <div class="mx-auto flex min-h-[calc(100vh-4rem)] w-full max-w-md items-center">
        <form id="login-form" class="w-full rounded-lg border border-red-950/10 bg-white p-6 shadow-sm">
          <div class="mb-6 flex items-center gap-3">
            <img src="imgs/logo-2.png" alt="Paróquia Santa Teresinha" class="h-14 w-14 object-contain">
            <div>
              <h1 class="text-xl font-bold text-red-950">Administrador</h1>
              <p class="mt-1 text-sm text-stone-600">Paróquia Santa Teresinha</p>
            </div>
          </div>

          <label for="admin-password" class="mb-2 block text-sm font-bold text-stone-800">Senha</label>
          <input
            id="admin-password"
            name="password"
            type="password"
            autocomplete="current-password"
            class="w-full rounded-md border border-stone-300 bg-white px-4 py-3 text-base outline-none transition focus:border-red-900 focus:ring-2 focus:ring-red-900/20"
            required
          >

          <p id="login-error" class="mt-3 hidden rounded-md bg-red-50 px-3 py-2 text-sm font-semibold text-red-900"></p>

          <button id="login-button" type="submit" class="mt-5 w-full rounded-md bg-red-950 px-4 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-red-800">
            Entrar
          </button>
        </form>
      </div>
    </section>

    <section id="admin-view" class="hidden min-h-screen">
      <header class="sticky top-0 z-20 border-b border-red-950/10 bg-white/95 px-4 py-3 shadow-sm backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-3">
          <div class="flex min-w-0 items-center gap-3">
            <img src="imgs/logo-2.png" alt="Paróquia Santa Teresinha" class="h-11 w-11 shrink-0 object-contain">
            <div class="min-w-0">
              <h1 class="truncate text-base font-bold text-red-950 sm:text-xl">Avisos Paroquiais</h1>
              <p id="admin-count" class="text-xs font-semibold text-stone-500">0 avisos</p>
            </div>
          </div>

          <div class="flex shrink-0 items-center gap-2">
            <button id="new-aviso-button" type="button" class="rounded-md bg-red-950 px-3 py-2 text-xs font-bold text-white transition hover:bg-red-800">
              Novo
            </button>

            <button id="logout-button" type="button" class="rounded-md border border-red-950 px-3 py-2 text-xs font-bold text-red-950 transition hover:bg-red-950 hover:text-white">
              Sair
            </button>
          </div>
        </div>
      </header>

      <div class="mx-auto grid max-w-6xl gap-5 px-4 py-5 lg:grid-cols-[minmax(0,1fr)_360px]">
        <section class="order-2 lg:order-1">
          <div id="admin-message" class="mb-4 hidden rounded-md px-4 py-3 text-sm font-semibold"></div>

          <div id="empty-state" class="hidden rounded-lg border border-dashed border-red-950/30 bg-white p-6 text-center">
            <h2 class="text-lg font-bold text-red-950">Nenhum aviso cadastrado</h2>
            <p class="mt-2 text-sm text-stone-600">Crie o primeiro aviso para exibir na página pública.</p>
          </div>

          <div id="avisos-list" class="grid gap-4"></div>
        </section>

        <aside class="order-1 lg:order-2">
          <form id="aviso-form" class="rounded-lg border border-red-950/10 bg-white p-5 shadow-sm lg:sticky lg:top-24">
            <div class="mb-4 flex items-start justify-between gap-3">
              <div>
                <h2 id="form-title" class="text-lg font-bold text-red-950">Novo aviso</h2>
                <p id="form-subtitle" class="mt-1 text-sm text-stone-600">Título e descrição aparecem no site.</p>
              </div>

              <button id="cancel-edit-button" type="button" class="hidden rounded-md border border-stone-300 px-3 py-2 text-xs font-bold text-stone-700 transition hover:bg-stone-100">
                Cancelar
              </button>
            </div>

            <input id="aviso-id" type="hidden">

            <label for="aviso-titulo" class="mb-2 block text-sm font-bold text-stone-800">Título</label>
            <input
              id="aviso-titulo"
              type="text"
              maxlength="140"
              class="w-full rounded-md border border-stone-300 bg-white px-4 py-3 text-base outline-none transition focus:border-red-900 focus:ring-2 focus:ring-red-900/20"
              required
            >

            <label for="aviso-descricao" class="mb-2 mt-4 block text-sm font-bold text-stone-800">Descrição</label>
            <textarea
              id="aviso-descricao"
              maxlength="2000"
              rows="7"
              class="w-full resize-y rounded-md border border-stone-300 bg-white px-4 py-3 text-base leading-relaxed outline-none transition focus:border-red-900 focus:ring-2 focus:ring-red-900/20"
              required
            ></textarea>

            <button id="save-aviso-button" type="submit" class="mt-5 w-full rounded-md bg-red-950 px-4 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-red-800">
              Salvar aviso
            </button>
          </form>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
